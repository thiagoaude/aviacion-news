<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviación News</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a25;
            --accent-arg: #22c55e;
            --accent-mundial: #3b82f6;
            --accent-ia: #a855f7;
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --border: #27272a;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 1rem;
        }

        header {
            text-align: center;
            padding: 2rem 0;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #22c55e, #3b82f6, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .fecha {
            color: var(--text-muted);
            font-size: 0.875rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .frase-card, .chiste-card {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.1), rgba(59, 130, 246, 0.1));
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .frase-card {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.15), rgba(59, 130, 246, 0.15));
        }

        .frase-card p {
            font-size: 1.25rem;
            font-style: italic;
            color: var(--text-primary);
        }

        .chiste-card p {
            font-size: 1rem;
            color: var(--text-secondary);
        }

        .section-title {
            font-size: 1rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 1rem;
            border-radius: 2px;
        }

        .arg .section-title::before { background: var(--accent-arg); }
        .mun .section-title::before { background: var(--accent-mundial); }
        .ia .section-title::before { background: var(--accent-ia); }

        .news-section {
            margin-bottom: 2rem;
        }

        .news-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1rem;
            margin-bottom: 0.75rem;
            transition: all 0.2s ease;
        }

        .news-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--text-muted);
            transform: translateY(-2px);
        }

        .news-title {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .news-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .news-origen {
            font-family: 'JetBrains Mono', monospace;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            background: rgba(255,255,255,0.05);
        }

        .arg .news-origen { color: var(--accent-arg); }
        .mun .news-origen { color: var(--accent-mundial); }
        .ia .news-origen { color: var(--accent-ia); }

        .news-resumen {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .last-updated {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
        }

        footer {
            text-align: center;
            padding: 1rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
        }

        footer a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.75rem;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 50vh;
            color: var(--text-muted);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent-arg);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 0.75rem;
            padding: 1.5rem;
            text-align: center;
            color: #ef4444;
        }

        @media (min-width: 600px) {
            .container { padding: 2rem; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Aviación News</h1>
            <p class="fecha" id="fecha-display"></p>
        </header>

        <div class="frase-card" id="frase-section" style="display:none;">
            <p id="frase-text"></p>
        </div>

        <div class="chiste-card" id="chiste-section" style="display:none;">
            <p id="chiste-text"></p>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Cargando noticias...</p>
        </div>

        <div id="news-content" style="display:none;">
            <section class="news-section arg">
                <h2 class="section-title">Aviación Argentina</h2>
                <div id="arg-list"></div>
            </section>

            <section class="news-section mun">
                <h2 class="section-title">Aviación Mundial</h2>
                <div id="mun-list"></div>
            </section>

            <section class="news-section ia">
                <h2 class="section-title">Inteligencia Artificial</h2>
                <div id="ia-list"></div>
            </section>
        </div>

        <div class="last-updated" id="updated"></div>
    </div>

    <script>
        async function loadNews() {
            const fechaDisplay = document.getElementById('fecha-display');
            const loading = document.getElementById('loading');
            const newsContent = document.getElementById('news-content');
            const updated = document.getElementById('updated');

            try {
                const response = await fetch('news.json?_=' + Date.now());
                if (!response.ok) throw new Error('No se pudo cargar');

                const data = await response.json();

                fechaDisplay.textContent = data.fecha || new Date().toISOString().split('T')[0];

                if (data.frase_diaria) {
                    document.getElementById('frase-section').style.display = 'block';
                    document.getElementById('frase-text').textContent = data.frase_diaria;
                }

                if (data.chiste) {
                    document.getElementById('chiste-section').style.display = 'block';
                    document.getElementById('chiste-text').textContent = data.chiste;
                }

                renderNews('arg-list', data.aviacion_argentina || []);
                renderNews('mun-list', data.aviacion_mundial || []);
                renderNews('ia-list', data.ia || []);

                loading.style.display = 'none';
                newsContent.style.display = 'block';
                updated.textContent = 'Última actualización: ' + new Date().toLocaleString('es-AR');

            } catch (e) {
                loading.innerHTML = '<div class="error">Error al cargar noticias<br><small>' + e.message + '</small></div>';
            }
        }

        function renderNews(containerId, news) {
            const container = document.getElementById(containerId);
            if (!news || news.length === 0) {
                container.innerHTML = '<p style="color:var(--text-muted);padding:1rem;">Sin noticias</p>';
                return;
            }

            container.innerHTML = news.map(item => `
                <article class="news-card">
                    <h3 class="news-title">${item.titulo || ''}</h3>
                    <div class="news-meta">
                        <span class="news-origen">${item.origen || ''}</span>
                        <span>${item.fecha_noticia || ''}</span>
                    </div>
                    <p class="news-resumen">${item.resumen || ''}</p>
                </article>
            `).join('');
        }

        loadNews();
    </script>
</body>
</html>
